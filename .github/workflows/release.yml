name: Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate version from timestamp
        id: version
        shell: bash
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          MINOR=$(( (YEAR - 2025) * 12 + MONTH - 1 ))
          PATCH=$(( $(date -u +%-d) * 100 + $(date -u +%-H) ))
          VERSION="0.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Patch version in tauri.conf.json
        shell: bash
        run: |
          cd src-tauri
          sed -i.bak 's/"version": ".*"/"version": "'"${{ steps.version.outputs.version }}"'"/' tauri.conf.json
          rm -f tauri.conf.json.bak

      - name: Patch version in Cargo.toml
        shell: bash
        run: |
          cd src-tauri
          sed -i.bak 's/^version = ".*"/version = "'"${{ steps.version.outputs.version }}"'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Patch version in package.json
        shell: bash
        run: |
          sed -i.bak 's/"version": ".*"/"version": "'"${{ steps.version.outputs.version }}"'"/' package.json
          rm -f package.json.bak

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build CLI
        run: cargo build --release --package buddio-cli

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: Buddio v${{ steps.version.outputs.version }}
          releaseBody: "Automated release from commit ${{ github.sha }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
